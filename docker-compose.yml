services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=admin123
      - CLICKHOUSE_DB=student_dashboard
    ports:
      - '8123:8123'
      - '9000:9000'
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user admin --password admin123 --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student-analytics-backend
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      - PORT=5000
      - CLICKHOUSE_URL=http://host.docker.internal:8123
      - CLICKHOUSE_DATABASE=student_dashboard
      - CLICKHOUSE_USER=admin
      - CLICKHOUSE_PASSWORD=admin123
      - NODE_ENV=production
    ports:
      - '5000:5000'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student-analytics-frontend
    restart: unless-stopped
    depends_on: []
    environment:
      - NODE_ENV=production
    ports:
      - '5173:5173'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  clickhouse_data:
